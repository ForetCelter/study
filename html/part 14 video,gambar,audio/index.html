<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1 id="judul">Galeri Multimedia</h1>

    <hr>

    <h2>Foto Favorit</h2>
    <figure>
         <img src="./stuff/WhatsApp Image 2026-04-12 at 10.38.11.jpeg" alt="Foto Favorit" width="300">
         <figcaption>Foto berisi title mobile legends</figcaption>
    </figure>
   
    <hr>

    <h2>Video Favorit</h2>
    <figure>
        <video src="./stuff/WhatsApp Video 2026-04-12 at 16.47.51.mp4" width="400" controls poster="./stuff/WhatsApp Image 2026-04-12 at 10.38.11.jpeg"></video>
        <figcaption>Video berisi kelucuan teman teman saya</figcaption>
    </figure>

    <hr>

    <h2>Musik Favorit</h2>
    <figure>
        <audio src="./stuff/WhatsApp Audio 2026-04-12 at 16.44.27.mpeg" controls></audio>
        <figcaption>Lagu favorit</figcaption>
    </figure>
    
    <hr>

    <h2>Video Latar</h2>
    <figure>
        <video src="./stuff/WhatsApp Video 2026-04-12 at 17.02.36.mp4" autoplay muted loop width="400"></video>
        <figcaption>Video latar</figcaption>
    </figure>

</body>
</html>
