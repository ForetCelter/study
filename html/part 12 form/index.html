<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label>Nama Lengkap</label>
        <br>
        <input type="text" placeholder="Masukkan nama lengkap">
        <br>
        <label>Email</label>
        <br>
        <input type="email" placeholder="Masukkan Email">
        <br>
        <label>Password</label>
        <br>
        <input type="password" placeholder="Masukkan Password">
        <br>
        <label>Jenis Kelamin</label>
        <br>
        <input type="radio" name="gender" id="laki-laki">
        <label for="laki-laki">Laki Laki</label>
        <input type="radio" name="gender" id="perempuan">
        <label for="perempuan">Perempuan</label>
        <br>
        <label>Hobi</label>
        <br>
        <input type="checkbox" name="hobi" id="membaca">
        <label for="membaca">Membaca</label>
        <br>
        <input type="checkbox" name="hobi" id="olahraga">
        <label for="olahraga">Olahraga</label>
        <br>
        <input type="checkbox" name="hobi" id="coding">
        <label for="coding">Coding</label>
        <br>
        <label>Kota Asal</label>
        <br>
        <select>
            <option>Makassar</option>
            <option>Jakarta</option>
            <option>Surabaya</option>
            <option>Bandung</option>
        </select>
        <br>
        <label>Pesan</label>
        <br>
        <textarea placeholder="Isi pesanmu disini"></textarea>
        <br>
        <button type="submit">Daftar</button>
    </form>
</body>
</html>
